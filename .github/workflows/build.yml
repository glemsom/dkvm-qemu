name: Build and Publish QEMU APK

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'APKBUILD'
      - 'patches/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

env:
  SIGNING_KEY_NAME: qemu-builder.rsa

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify signing key secret exists
        run: |
          if [ -z "${{ secrets.SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::SIGNING_PRIVATE_KEY secret is not set"
            echo "Please add the private key matching keys/qemu-builder.rsa.pub to GitHub Secrets"
            exit 1
          fi
          echo "✓ Signing key secret found"

      - name: Verify key pair matches
        run: |
          # Write the secret to a temp file
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" > /tmp/signing-key.pem
          
          # Extract public key from the private key and compare
          openssl rsa -in /tmp/signing-key.pem -pubout -out /tmp/derived-pubkey.pem 2>/dev/null
          
          # Compare (normalize whitespace first)
          diff <(grep -v '^--' /tmp/derived-pubkey.pem | tr -d '\n ') \
               <(grep -v '^--' keys/qemu-builder.rsa.pub | tr -d '\n ') \
               && echo "✓ Public key matches! Signature verification will work." \
               || (echo "::error::Public key mismatch! The SECRET private key does not match qemu-builder.rsa.pub"; exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Alpine packages from image
        run: |
          # Build the image which contains the APK packages
          docker build -t qemu-apk-builder .
          
          # Extract packages from the built image
          docker run --rm -v $(pwd)/repo:/packages qemu-apk-builder sh -c "
            # Copy packages from build context if they exist
            if [ -d /workspace/packages ]; then
              cp /workspace/packages/*.apk /packages/ 2>/dev/null || true
            fi
          " || true

      - name: Create signed repository
        run: |
          # Write the private key from secrets
          mkdir -p keys
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" > keys/qemu-builder.rsa
          chmod 600 keys/qemu-builder.rsa
          
          # Create and sign the repository
          ./create-repo.sh repo/x86_64

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact
        run: |
          # Copy public key to repo for easy verification
          cp keys/*.rsa.pub repo/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './repo'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5