name: Build and Publish QEMU APK

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'APKBUILD'
      - 'patches/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup signing key
        run: |
          mkdir -p keys
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" > keys/signkey.rsa
          chmod 600 keys/signkey.rsa
          openssl rsa -in keys/signkey.rsa -pubout > keys/signkey.rsa.pub 2>/dev/null

      - name: Build Docker image
        run: docker build -t qemu-apk-builder .

      - name: Build APK packages
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/keys:/home/builder/.abuild \
            -v ${{ github.workspace }}:/src:ro \
            -v ${{ github.workspace }}/repo/x86_64:/out \
            --user root \
            qemu-apk-builder sh -c "
              mkdir -p /home/builder/qemu /out && \
              (cd /src && tar cf - --exclude=keys .) | (cd /home/builder/qemu && tar xf -) && \
              chown -R builder:abuild /home/builder/qemu /out && \
              cp /home/builder/.abuild/signkey.rsa.pub /etc/apk/keys/signkey.rsa.pub && \
              HOME=/home/builder sudo -u builder sh -c 'cd /home/builder/qemu && PACKAGER_PRIVKEY=/home/builder/.abuild/signkey.rsa abuild -r' && \
              find /home/builder/packages -name '*.apk' -exec cp {} /out/ \;
            "
          echo "APK packages built:"
          ls -la repo/x86_64/

      - name: Create signed repository
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/repo/x86_64:/repo \
            -v ${{ github.workspace }}/keys:/keys:ro \
            alpine:3.23 sh -c "
              apk update && \
              apk add --no-cache alpine-sdk && \
              cd /repo && \
              apk --allow-untrusted index *.apk -o APKINDEX.tar.gz && \
              PACKAGER_PRIVKEY=/keys/signkey.rsa abuild-sign APKINDEX.tar.gz
            "
          cp keys/signkey.rsa.pub repo/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './repo'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
