name: Build and Publish QEMU APK

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'APKBUILD'
      - 'patches/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

env:
  SIGNING_KEY_NAME: qemu-builder.rsa
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify signing key secret exists
        run: |
          if [ -z "${{ secrets.SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::SIGNING_PRIVATE_KEY secret is not set"
            echo "Please add the private key matching keys/qemu-builder.rsa.pub to GitHub Secrets"
            exit 1
          fi
          echo "✓ Signing key secret found"

      - name: Verify key pair matches
        run: |
          # Write the secret to a temp file
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" > /tmp/signing-key.pem
          
          # Extract public key from the private key and compare
          openssl rsa -in /tmp/signing-key.pem -pubout -out /tmp/derived-pubkey.pem 2>/dev/null
          
          # Compare (normalize whitespace first)
          diff <(grep -v '^--' /tmp/derived-pubkey.pem | tr -d '\n ') \
               <(grep -v '^--' keys/qemu-builder.rsa.pub | tr -d '\n ') \
               && echo "✓ Public key matches! Signature verification will work." \
               || (echo "::error::Public key mismatch! The SECRET private key does not match qemu-builder.rsa.pub"; exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build APK packages in Docker
        run: |
          # Create a persistent volume for packages
          docker volume create qemu-packages
          
          # Build the Docker image
          docker build -t qemu-apk-builder .
          
          # Run the container to build packages, mounting the entire workspace as source
          docker run --rm \
            -v qemu-packages:/home/builder/packages \
            -v ${{ github.workspace }}:/home/builder/qemu:ro \
            qemu-apk-builder sh -c "
              cd /home/builder/qemu &&
              abuild -r
            "
          
          # Extract built packages from the volume
          mkdir -p repo/x86_64
          docker run --rm \
            -v qemu-packages:/home/builder/packages \
            -v ${{ github.workspace }}/repo/x86_64:/out \
            alpine:3.23 sh -c "
              find /home/builder/packages -name '*.apk' -exec cp {} /out/ \;
            "
          
          echo "APK packages built:"
          ls -la repo/x86_64/

      - name: Create signed repository
        run: |
          # Write the private key from secrets
          mkdir -p keys
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" > keys/qemu-builder.rsa
          chmod 600 keys/qemu-builder.rsa
          
          # Create and sign the repository
          ./create-repo.sh repo/x86_64

      - name: Upload repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-repo
          path: ./repo
          retention-days: 1

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download repo artifact
        uses: actions/download-artifact@v4
        with:
          name: apk-repo
          path: ./repo

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact
        run: |
          # Copy public key to repo for easy verification
          cp keys/*.rsa.pub repo/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './repo'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5