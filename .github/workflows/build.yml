name: Build and Publish QEMU APK

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'APKBUILD'
      - 'patches/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build APM packages
        run: |
          docker build -t qemu-apk-builder .
          docker run --rm -v $(pwd)/repo:/packages alpine:3.23 sh -c "
            apk add --no-cache alpine-sdk
            # Copy APKBUILD and patches
            cp -r /workspace/APKBUILD /workspace/patches /tmp/ 2>/dev/null || true
          " || echo "Build would happen here - skipped for now"

      - name: Generate signing key
        run: |
          mkdir -p keys
          # Generate a key for CI (in practice, use secrets)
          openssl genrsa -out keys/ci-builder.rsa 2048 2>/dev/null
          openssl rsa -in keys/ci-builder.rsa -pubout -out keys/ci-builder.rsa.pub

      - name: Create repository
        run: |
          # This would run after actual package build
          # For now, we assume packages exist in repo/
          echo "Repository creation placeholder"

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './repo'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5