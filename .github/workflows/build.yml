name: Build and Publish QEMU APK

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'APKBUILD'
      - 'patches/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup signing key
        run: |
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" > keys/signkey.rsa
          chmod 600 keys/signkey.rsa
          if [ ! -s keys/signkey.rsa ]; then
            echo "::error::SIGNING_PRIVATE_KEY secret is empty"
            exit 1
          fi
          if ! openssl rsa -in keys/signkey.rsa -check -noout 2>&1; then
            echo "::error::SIGNING_PRIVATE_KEY is not a valid RSA private key"
            exit 1
          fi
          echo "Signing key verified OK"

      - name: Build Docker image
        run: docker build -t qemu-apk-builder .

      - name: Build APK packages
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/builder/qemu \
            -v ${{ github.workspace }}/repo/x86_64:/out \
            -v ${{ github.workspace }}/keys/signkey.rsa.pub:/etc/apk/keys/signkey.rsa.pub:ro \
            -e SIGNING_PRIVATE_KEY="${{ secrets.SIGNING_PRIVATE_KEY }}" \
            --user root \
            qemu-apk-builder sh -c "
              mkdir -p /out /home/builder/.abuild && \
              echo \"\$SIGNING_PRIVATE_KEY\" > /home/builder/.abuild/signkey.rsa && \
              chmod 600 /home/builder/.abuild/signkey.rsa && \
              cp /home/builder/qemu/keys/signkey.rsa.pub /home/builder/.abuild/signkey.rsa.pub && \
              echo \"PACKAGER_PRIVKEY=/home/builder/.abuild/signkey.rsa\" > /home/builder/.abuild/abuild.conf && \
              chown -R builder:abuild /home/builder/qemu /home/builder/.abuild && \
              HOME=/home/builder sudo -u builder sh -c 'cd /home/builder/qemu && abuild -r' && \
              find /home/builder/packages -name '*.apk' -exec cp {} /out/ \;
            "
          echo "APK packages built:"
          ls -la repo/x86_64/

      - name: Create signed repository
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/repo/x86_64:/repo \
            -v ${{ github.workspace }}/keys:/keys:ro \
            alpine:3.23 sh -c "
              set -e
              apk update >/dev/null 2>&1
              apk add --no-cache alpine-sdk >/dev/null 2>&1
              cd /repo

              echo 'Creating APKINDEX...'
              apk --allow-untrusted index *.apk -o APKINDEX.tar.gz

              echo 'Signing APKINDEX...'
              abuild-sign -k /keys/signkey.rsa APKINDEX.tar.gz

              echo 'Verifying signature...'
              if tar -tzf APKINDEX.tar.gz | grep -q '\.SIGN\.RSA\.'; then
                echo 'APKINDEX.tar.gz is signed:'
                tar -tzf APKINDEX.tar.gz
              else
                echo 'ERROR: APKINDEX.tar.gz is NOT signed!'
                exit 1
              fi

              cp /keys/signkey.rsa.pub /repo/signkey.rsa.pub
              echo 'Repository ready.'
            "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './repo'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
